<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda da Turma</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeede9;
      --text: #1a1a18;
      --text-secondary: #6b6b68;
      --text-tertiary: #9a9a96;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg-secondary: #252523;
        --bg-tertiary: #2e2e2b;
        --text: #f0efe9;
        --text-secondary: #a0a09c;
        --text-tertiary: #6b6b68;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.2);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-tertiary);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 12px;
    }

    .title {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .btn-add {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-md);
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font);
    }

    .btn-add:hover { opacity: 0.82; }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .filter-btn {
      border: 0.5px solid var(--border-md);
      background: var(--bg);
      border-radius: 20px;
      padding: 6px 15px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: var(--font);
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin: 1.5rem 0 8px;
    }

    .items-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .item-card.overdue { border-left: 3px solid #E24B4A; }
    .item-card.today   { border-left: 3px solid #1D9E75; }
    .item-card.upcoming { border-left: 3px solid #378ADD; }

    .type-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .badge-prova     { background: #FAECE7; color: #993C1D; }
    .badge-trabalho  { background: #E6F1FB; color: #185FA5; }
    .badge-atividade { background: #EAF3DE; color: #3B6D11; }
    .badge-evento    { background: #FAEEDA; color: #854F0B; }

    .item-info { flex: 1; min-width: 0; }

    .item-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-meta {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .item-date {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      text-align: right;
      line-height: 1.4;
    }

    .item-date .days-label { font-size: 11px; }
    .item-date.overdue { color: #E24B4A; font-weight: 500; }
    .item-date.today   { color: #1D9E75; font-weight: 500; }

    .btn-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 18px;
      padding: 4px;
      line-height: 1;
      font-family: var(--font);
    }

    .btn-del:hover { color: #E24B4A; }

    .empty {
      text-align: center;
      padding: 3.5rem 0;
      color: var(--text-secondary);
      font-size: 15px;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      width: 100%;
      max-width: 440px;
      border: 0.5px solid var(--border-md);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--text);
    }

    .field { margin-bottom: 14px; }

    .field label {
      font-size: 13px;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 5px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      font-size: 14px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      padding: 9px 11px;
      background: var(--bg-secondary);
      color: var(--text);
      font-family: var(--font);
      outline: none;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--text-secondary);
    }

    .field textarea { resize: vertical; min-height: 65px; }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 1.25rem;
      justify-content: flex-end;
    }

    .btn-cancel {
      border: 0.5px solid var(--border-md);
      background: transparent;
      border-radius: var(--radius-md);
      padding: 9px 18px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: var(--font);
    }

    .btn-save {
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-md);
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
    }

    .btn-save:hover { opacity: 0.85; }

    @media (max-width: 480px) {
      .item-card { flex-wrap: wrap; }
      .item-date { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <div class="title">Agenda da Turma</div>
        <div class="subtitle">Provas, trabalhos, atividades e eventos</div>
      </div>
      <button class="btn-add" onclick="openModal()">+ Adicionar</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('prova', this)">Provas</button>
      <button class="filter-btn" onclick="setFilter('trabalho', this)">Trabalhos</button>
      <button class="filter-btn" onclick="setFilter('atividade', this)">Atividades</button>
      <button class="filter-btn" onclick="setFilter('evento', this)">Eventos</button>
    </div>

    <div id="list"></div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title">Novo item</div>
      <div class="field">
        <label>Título</label>
        <input type="text" id="f-title" placeholder="Ex: Prova de Direito Tributário" />
      </div>
      <div class="field">
        <label>Tipo</label>
        <select id="f-type">
          <option value="prova">Prova</option>
          <option value="trabalho">Trabalho</option>
          <option value="atividade">Atividade</option>
          <option value="evento">Evento</option>
        </select>
      </div>
      <div class="field">
        <label>Matéria / Disciplina</label>
        <input type="text" id="f-subject" placeholder="Ex: Direito Civil" />
      </div>
      <div class="field">
        <label>Data</label>
        <input type="date" id="f-date" />
      </div>
      <div class="field">
        <label>Observações (opcional)</label>
        <textarea id="f-notes" placeholder="Conteúdo, local, instruções..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="saveItem()">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'agenda_turma_v1';
    let items = [];
    let currentFilter = 'todos';

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        items = raw ? JSON.parse(raw) : [];
      } catch(e) { items = []; }
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch(e) {}
    }

    function setFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function dateStatus(dateStr) {
      const today = new Date(); today.setHours(0,0,0,0);
      const d = new Date(dateStr + 'T00:00:00');
      if (d < today) return 'overdue';
      if (d.getTime() === today.getTime()) return 'today';
      return 'upcoming';
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function daysLabel(dateStr) {
      const today = new Date(); today.setHours(0,0,0,0);
      const d = new Date(dateStr + 'T00:00:00');
      const diff = Math.round((d - today) / 86400000);
      if (diff < 0) return Math.abs(diff) + 'd atrás';
      if (diff === 0) return 'hoje';
      if (diff === 1) return 'amanhã';
      return 'em ' + diff + ' dias';
    }

    function render() {
      const list = document.getElementById('list');
      let filtered = currentFilter === 'todos' ? items : items.filter(i => i.type === currentFilter);
      filtered = [...filtered].sort((a, b) => a.date.localeCompare(b.date));

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">Nenhum item encontrado.<br><span style="font-size:13px">Clique em "+ Adicionar" para começar.</span></div>';
        return;
      }

      const groups = {};
      filtered.forEach(item => {
        const s = dateStatus(item.date);
        if (!groups[s]) groups[s] = [];
        groups[s].push(item);
      });

      const order = ['overdue', 'today', 'upcoming'];
      const labels = { overdue: 'Atrasados', today: 'Hoje', upcoming: 'Próximos' };
      const typeLabels = { prova: 'Prova', trabalho: 'Trabalho', atividade: 'Atividade', evento: 'Evento' };

      let html = '';
      order.forEach(g => {
        if (!groups[g]) return;
        html += '<div class="section-label">' + labels[g] + '</div><div class="items-list" style="margin-bottom:0.25rem">';
        groups[g].forEach(item => {
          const st = dateStatus(item.date);
          const meta = [item.subject, item.notes].filter(Boolean).join(' · ');
          html += `
            <div class="item-card ${st}">
              <span class="type-badge badge-${item.type}">${typeLabels[item.type]}</span>
              <div class="item-info">
                <div class="item-title">${escHtml(item.title)}</div>
                ${meta ? '<div class="item-meta">' + escHtml(meta) + '</div>' : ''}
              </div>
              <div class="item-date ${st}">
                ${formatDate(item.date)}<br>
                <span class="days-label">${daysLabel(item.date)}</span>
              </div>
              <button class="btn-del" onclick="deleteItem(${item.id})" title="Remover">×</button>
            </div>`;
        });
        html += '</div>';
      });

      list.innerHTML = html;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function openModal() {
      document.getElementById('f-title').value = '';
      document.getElementById('f-subject').value = '';
      document.getElementById('f-notes').value = '';
      document.getElementById('f-type').value = 'prova';
      document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
      document.getElementById('modal').classList.add('open');
      setTimeout(() => document.getElementById('f-title').focus(), 50);
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    function saveItem() {
      const title   = document.getElementById('f-title').value.trim();
      const type    = document.getElementById('f-type').value;
      const subject = document.getElementById('f-subject').value.trim();
      const date    = document.getElementById('f-date').value;
      const notes   = document.getElementById('f-notes').value.trim();
      if (!title || !date) { alert('Preencha pelo menos o título e a data.'); return; }
      items.push({ id: Date.now(), title, type, subject, date, notes });
      save();
      closeModal();
      render();
    }

    function deleteItem(id) {
      if (!confirm('Remover este item?')) return;
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    load();
    render();
  </script>
</body>
</html>
